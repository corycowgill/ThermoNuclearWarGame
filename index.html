let audioCtx = null;
function resumeAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
}
function beep(freq,dur,vol){
  freq=freq||800;dur=dur||0.08;vol=vol||0.15;
  try{ resumeAudio(); } catch(e){ return; }
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='square';o.frequency.value=freq;g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
}
function alarm(){
  resumeAudio();
  for(let i=0;i<6;i++){setTimeout(()=>beep(600,0.15,0.2),i*300);setTimeout(()=>beep(900,0.15,0.2),i*300+150);}
}
function rumble(dur){
  dur=dur||1.5;try{ resumeAudio(); } catch(e){ return; }
  const bufSize=audioCtx.sampleRate*dur,buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  const data=buf.getChannelData(0);for(let i=0;i<bufSize;i++)data[i]=(Math.random()*2-1)*Math.exp(-i/(bufSize*0.3));
  const src=audioCtx.createBufferSource(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();
  f.type='lowpass';f.frequency.value=150;g.gain.value=0.4;
  src.buffer=buf;src.connect(f);f.connect(g);g.connect(audioCtx.destination);src.start();
}

// ========== COORDINATE CONVERSION ==========
function latLngToGlobe(lat, lng, r) {
  r = r || GLOBE_RADIUS;
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}

function latLngToFlat(lat, lng) {
  const x = (lng / 180) * (MAP_WIDTH / 2);
  const y = (lat / 90) * (MAP_HEIGHT / 2);
  return new THREE.Vector3(x, y, 0);
}

function latLngToVec3(lat, lng, r) {
  // Returns position based on current viewTransition (interpolates globe<->flat)
  const gp = latLngToGlobe(lat, lng, r);
  const fp = latLngToFlat(lat, lng);
  return gp; // default to globe; flat handled separately
}

// ========== MOUSE/TOUCH CONTROLS ==========
let isDragging = false, prevMouse = {x:0,y:0};
let autoRotate = true;
let pinchDist = 0;
let mapPanX = 0, mapPanY = 0, targetPanX = 0, targetPanY = 0;

canvas.addEventListener('mousedown', e => {
  isDragging=true; prevMouse={x:e.clientX,y:e.clientY}; autoRotate=false; resumeAudio();
});
canvas.addEventListener('mousemove', e => {
  if(!isDragging) return;
  const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
  if(viewMode==='globe') {
    globeGroup.rotation.y += dx * 0.005;
    globeGroup.rotation.x += dy * 0.005;
    globeGroup.rotation.x = Math.max(-1.2, Math.min(1.2, globeGroup.rotation.x));
  } else {
    targetPanX += dx * 0.01;
    targetPanY -= dy * 0.01;
  }
  prevMouse = {x:e.clientX, y:e.clientY};
});
canvas.addEventListener('mouseup', () => isDragging=false);
canvas.addEventListener('mouseleave', () => isDragging=false);

// Mouse wheel zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.3 : -0.3;
  targetZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, targetZoom + delta));
}, {passive:false});

// Touch: drag + pinch-to-zoom
canvas.addEventListener('touchstart', e => {
  resumeAudio();
  if(e.touches.length === 1) {
    isDragging = true; autoRotate = false;
    prevMouse = {x:e.touches[0].clientX, y:e.touches[0].clientY};
  } else if(e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist = Math.sqrt(dx*dx + dy*dy);
  }
}, {passive:true});

canvas.addEventListener('touchmove', e => {
  if(e.touches.length === 1 && isDragging) {
    const t = e.touches[0];
    const dx = t.clientX - prevMouse.x, dy = t.clientY - prevMouse.y;
    if(viewMode==='globe') {
      globeGroup.rotation.y += dx * 0.005;
      globeGroup.rotation.x += dy * 0.005;
      globeGroup.rotation.x = Math.max(-1.2, Math.min(1.2, globeGroup.rotation.x));
    } else {
      targetPanX += dx * 0.008;
      targetPanY -= dy * 0.008;
    }
    prevMouse = {x:t.clientX, y:t.clientY};
  } else if(e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const newDist = Math.sqrt(dx*dx + dy*dy);
    if(pinchDist > 0) {
      const scale = pinchDist / newDist;
      targetZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, targetZoom * scale));
    }
    pinchDist = newDist;
  }
}, {passive:true});

canvas.addEventListener('touchend', e => {
  if(e.touches.length < 2) pinchDist = 0;
  if(e.touches.length === 0) isDragging = false;
}, {passive:true});

// ========== MISSILE ARCS ==========
function createMissileArc(fromCity, toCity, color, onComplete) {
  if(viewMode==='globe' || true) { // always create both
    // Globe arc
    const gs = latLngToGlobe(fromCity.lat, fromCity.lng, GLOBE_RADIUS*1.01);
    const ge = latLngToGlobe(toCity.lat, toCity.lng, GLOBE_RADIUS*1.01);
    const gm = gs.clone().add(ge).multiplyScalar(0.5).normalize().multiplyScalar(GLOBE_RADIUS*1.8);
    const gCurve = new THREE.QuadraticBezierCurve3(gs, gm, ge);

    const gTrailGeo = new THREE.BufferGeometry();
    const gTrailMat = new THREE.LineBasicMaterial({color:color, transparent:true, opacity:0.8});
    const gTrailLine = new THREE.Line(gTrailGeo, gTrailMat);
    globeGroup.add(gTrailLine);
    const gHead = new THREE.Mesh(
      new THREE.SphereGeometry(0.015, 6, 6),
      new THREE.MeshBasicMaterial({color:0xffffff})
    );
    globeGroup.add(gHead);

    // Flat arc
    const fs = latLngToFlat(fromCity.lat, fromCity.lng);
    const fe = latLngToFlat(toCity.lat, toCity.lng);
    const fmid = fs.clone().add(fe).multiplyScalar(0.5);
    fmid.y += fs.distanceTo(fe) * 0.3;
    fmid.z = 0.05;
    const fCurve = new THREE.QuadraticBezierCurve3(
      new THREE.Vector3(fs.x, fs.y, 0.02),
      fmid,
      new THREE.Vector3(fe.x, fe.y, 0.02)
    );

    const fTrailGeo = new THREE.BufferGeometry();
    const fTrailMat = new THREE.LineBasicMaterial({color:color, transparent:true, opacity:0.8});
    const fTrailLine = new THREE.Line(fTrailGeo, fTrailMat);
    mapGroup.add(fTrailLine);
    const fHead = new THREE.Mesh(
      new THREE.CircleGeometry(0.03, 8),
      new THREE.MeshBasicMaterial({color:0xffffff})
    );
    mapGroup.add(fHead);

    const missile = {
      gCurve, gTrailLine, gTrailGeo, gHead,
      fCurve, fTrailLine, fTrailGeo, fHead,
      totalPoints:80, progress:0,
      speed: 0.012 + Math.random()*0.005,
      onComplete, done:false, toCity, color
    };
    activeMissiles.push(missile);
    return missile;
  }
}

function updateMissiles(delta) {
  activeMissiles.forEach(m => {
    if(m.done) return;
    m.progress += m.speed;
    if(m.progress >= 1) {
      m.progress = 1;
      m.done = true;
      globeGroup.remove(m.gHead);
      mapGroup.remove(m.fHead);
      createExplosion(m.toCity);
      rumble(1);
      if(m.onComplete) m.onComplete();
      return;
    }

    const drawCount = Math.floor(m.progress * m.totalPoints);

    // Update globe trail
    const gPts = [];
    for(let i=0; i<=drawCount; i++) {
      gPts.push(m.gCurve.getPoint(i / m.totalPoints));
    }
    if(gPts.length > 1) {
      m.gTrailLine.geometry.dispose();
      m.gTrailLine.geometry = new THREE.BufferGeometry().setFromPoints(gPts);
    }
    m.gHead.position.copy(m.gCurve.getPoint(m.progress));

    // Update flat trail
    const fPts = [];
    for(let i=0; i<=drawCount; i++) {
      fPts.push(m.fCurve.getPoint(i / m.totalPoints));
    }
    if(fPts.length > 1) {
      m.fTrailLine.geometry.dispose();
      m.fTrailLine.geometry = new THREE.BufferGeometry().setFromPoints(fPts);
    }
    m.fHead.position.copy(m.fCurve.getPoint(m.progress));
  });
}

// ========== EXPLOSIONS ==========
function createExplosion(city) {
  const gpos = latLngToGlobe(city.lat, city.lng, GLOBE_RADIUS*1.01);
  const fpos = latLngToFlat(city.lat, city.lng);

  // Globe explosion
  const gFlash = new THREE.Mesh(
    new THREE.SphereGeometry(0.04, 12, 12),
    new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:1})
  );
  gFlash.position.copy(gpos);
  globeGroup.add(gFlash);

  const gRings = [];
  for(let i=0; i<3; i++) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(0.001, 0.01, 24),
      new THREE.MeshBasicMaterial({color:0xff4400, transparent:true, opacity:0.9, side:THREE.DoubleSide})
    );
    ring.position.copy(gpos);
    ring.lookAt(new THREE.Vector3(0,0,0));
    globeGroup.add(ring);
    gRings.push({mesh:ring, delay:i*0.3, scale:0, maxScale:0.12+i*0.06});
  }

  // Flat explosion
  const fFlash = new THREE.Mesh(
    new THREE.CircleGeometry(0.08, 16),
    new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:1})
  );
  fFlash.position.set(fpos.x, fpos.y, 0.03);
  mapGroup.add(fFlash);

  const fRings = [];
  for(let i=0; i<3; i++) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(0.001, 0.01, 24),
      new THREE.MeshBasicMaterial({color:0xff4400, transparent:true, opacity:0.9, side:THREE.DoubleSide})
    );
    ring.position.set(fpos.x, fpos.y, 0.03);
    mapGroup.add(ring);
    fRings.push({mesh:ring, delay:i*0.3, scale:0, maxScale:0.2+i*0.1});
  }

  explosionsList.push({gFlash, gRings, fFlash, fRings, time:0, done:false, city});

  // Casualties + tracking
  destroyedCities.add(city.name);
  const casualties = Math.floor(city.pop * (0.4 + Math.random()*0.4));
  const side = cities.us.find(c => c.name===city.name) ? 'us' : 'ussr';
  casualtyCount[side] += casualties;
  updateCasualtyDisplay();

  // Mark city as destroyed visually
  const cm = cityMeshes[city.name];
  if(cm) {
    cm.gdot.material.color.setHex(0x441100);
    cm.gring.material.color.setHex(0x441100);
    cm.fdot.material.color.setHex(0x441100);
    cm.fring.material.color.setHex(0x441100);
  }
}

function updateExplosions(delta) {
  explosionsList.forEach(exp => {
    if(exp.done) return;
    exp.time += delta;

    // Flash fades
    const flashOp = Math.max(0, 1 - exp.time * 2);
    exp.gFlash.material.opacity = flashOp;
    exp.fFlash.material.opacity = flashOp;
    const flashScale = 1 + exp.time * 3;
    exp.gFlash.scale.set(flashScale, flashScale, flashScale);
    exp.fFlash.scale.set(flashScale, flashScale, flashScale);

    // Rings expand
    [exp.gRings, exp.fRings].forEach(rings => {
      rings.forEach(r => {
        const t = Math.max(0, exp.time - r.delay);
        if(t > 0) {
          r.scale = Math.min(r.maxScale, t * 0.4);
          r.mesh.scale.set(r.scale * 20, r.scale * 20, 1);
          r.mesh.material.opacity = Math.max(0, 0.9 - t * 0.5);
        }
      });
    });

    if(exp.time > 3) {
      exp.done = true;
      globeGroup.remove(exp.gFlash);
      exp.gRings.forEach(r => globeGroup.remove(r.mesh));
      mapGroup.remove(exp.fFlash);
      exp.fRings.forEach(r => mapGroup.remove(r.mesh));

      // Leave scar on globe
      const scar = new THREE.Mesh(
        new THREE.SphereGeometry(0.04, 8, 8),
        new THREE.MeshBasicMaterial({color:0x441100, transparent:true, opacity:0.6})
      );
      scar.position.copy(latLngToGlobe(exp.city.lat, exp.city.lng, GLOBE_RADIUS*1.005));
      globeGroup.add(scar);

      // Leave scar on map
      const fScar = new THREE.Mesh(
        new THREE.CircleGeometry(0.06, 12),
        new THREE.MeshBasicMaterial({color:0x441100, transparent:true, opacity:0.6})
      );
      const fp = latLngToFlat(exp.city.lat, exp.city.lng);
      fScar.position.set(fp.x, fp.y, 0.005);
      mapGroup.add(fScar);
    }
  });
}

// ========== TERMINAL ==========
const terminalEl = document.getElementById('terminal');
let typeQueue = [], isTyping = false;

function addLine(text, instant, bright) {
  return new Promise(resolve => {
    typeQueue.push({text, instant, bright, resolve});
    processQueue();
  });
}

function processQueue() {
  if(isTyping || typeQueue.length===0) return;
  isTyping = true;
  const {text, instant, bright, resolve} = typeQueue.shift();
  const div = document.createElement('div');
  div.className = 'line' + (bright?' bright':'');
  terminalEl.appendChild(div);

  if(instant) {
    div.textContent = text;
    terminalEl.scrollTop = terminalEl.scrollHeight;
    isTyping = false; resolve(); processQueue();
    return;
  }

  let idx = 0;
  function typeChar() {
    if(idx < text.length) {
      div.textContent = text.substring(0, idx+1);
      idx++;
      if(idx%3===0) beep(200+Math.random()*400, 0.02, 0.03);
      terminalEl.scrollTop = terminalEl.scrollHeight;
      setTimeout(typeChar, 25);
    } else {
      isTyping = false; resolve(); processQueue();
    }
  }
  typeChar();
}

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

    '<div class="cas-line cas-total"><span>TOTAL:</span><span>' + total.toLocaleString() + '</span></div>' +
    '<div class="cas-line"><span>CITIES HIT:</span><span>' + destroyedCities.size + '</span></div>';
}

// ========== GAME FLOW ==========
async function titleSequence() {
  gamePhase = 'title';
  document.getElementById('title-screen').style.display = 'block';
  const titleEl = document.getElementById('title-text');
  const subEl = document.getElementById('subtitle-text');

  await sleep(800);
  // Typewriter title
  const titleStr = 'GLOBAL THERMONUCLEAR WAR';
  for(let i=0; i<titleStr.length; i++) {
    titleEl.textContent += titleStr[i];
    beep(300+Math.random()*300, 0.03, 0.06);
    await sleep(80);
  }
  await sleep(600);
  const subStr = 'GREETINGS, PROFESSOR FALKEN.';
  for(let i=0; i<subStr.length; i++) {
    subEl.textContent += subStr[i];
    beep(250+Math.random()*200, 0.02, 0.04);
    await sleep(50);
  }
  await sleep(1000);

  document.getElementById('start-prompt').style.display = 'block';
  gamePhase = 'waitclick';

  // Wait for click/key to proceed
  await new Promise(resolve => {
    function go() {
      document.removeEventListener('click', go);
      document.removeEventListener('keydown', go);
      document.removeEventListener('touchstart', go);
      resolve();
    }
    document.addEventListener('click', go);
    document.addEventListener('keydown', go);
    document.addEventListener('touchstart', go, {passive:true});
  });

  beep(800, 0.1, 0.15);
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('start-prompt').style.display = 'none';

  // Show side selection
  gamePhase = 'choose';
  document.getElementById('side-select').style.display = 'block';
}

function selectSide(side) {
  beep(1000, 0.1, 0.15);
  playerSide = side;
  document.getElementById('side-select').style.display = 'none';

  if(side === 'zero') {
    document.getElementById('side-label').textContent = 'WOPR AUTONOMOUS MODE';
    playerZeroMode();
  } else {
    document.getElementById('side-label').textContent =
      (side==='us' ? 'US' : 'USSR') + ' STRATEGIC COMMAND';
    strategyPhase();
  }
}

async function strategyPhase() {
  gamePhase = 'strategy';
  const sideName = playerSide==='us' ? 'UNITED STATES' : 'SOVIET UNION';
  const enemySide = playerSide==='us' ? 'ussr' : 'us';

  await addLine('LOGON: ' + sideName + ' STRATEGIC COMMAND', false, true);
  await sleep(300);
  await addLine('ACCESSING WOPR TARGETING SYSTEM...', false);
  await sleep(500);
  await addLine('SATELLITE UPLINK ESTABLISHED', false);
  await sleep(300);

  setDefcon(4); beep(400, 0.2, 0.15);
  await addLine('DEFCON 4 - INCREASED READINESS', false, true);
  await sleep(400);
  await addLine('');
  await addLine('SELECT TARGET CITIES FOR NUCLEAR STRIKE (3-6 TARGETS)', false, true);
  await addLine('WARNING: ENEMY RETALIATION IS ASSURED', false, true);

  // Show target panel
  const panel = document.getElementById('target-panel');
  panel.style.display = 'flex';
  const list = document.getElementById('target-list');
  list.innerHTML = '';

  const enemyCities = cities[enemySide];
  enemyCities.forEach(city => {
    const btn = document.createElement('button');
    btn.className = 'target-btn';
    btn.textContent = city.name + ' (POP: ' + (city.pop/1000000).toFixed(1) + 'M)';
    btn.onclick = () => {
      beep(800, 0.05, 0.08);
      if(btn.classList.contains('selected')) {
        btn.classList.remove('selected');
        selectedTargets = selectedTargets.filter(t => t.name !== city.name);
      } else if(selectedTargets.length < 6) {
        btn.classList.add('selected');
        selectedTargets.push(city);
      }
      document.getElementById('launch-btn').style.display =
        selectedTargets.length >= 3 ? 'block' : 'none';
      document.getElementById('target-title').textContent =
        'SELECT TARGETS (' + selectedTargets.length + '/6)';
    };
    list.appendChild(btn);
  });

  document.getElementById('missile-count').textContent = 'MISSILES: 6';
}

async function launchMissiles() {
  if(selectedTargets.length < 3 || gamePhase==='war') return;
  gamePhase = 'war';
  beep(1200, 0.1, 0.2);

  document.getElementById('target-panel').style.display = 'none';
  document.getElementById('casualty-display').style.display = 'block';

  const enemySide = playerSide==='us' ? 'ussr' : 'us';
  const playerTag = playerSide==='us' ? 'US' : 'USSR';
  const enemyTag = enemySide==='us' ? 'US' : 'USSR';
  const playerCities = cities[playerSide];
  const enemyCities = cities[enemySide];

  // Escalate DEFCON
  setDefcon(3); beep(500, 0.2, 0.2);
  await addLine(''); await addLine('DEFCON 3 - ROUND HOUSE', false, true);
  await sleep(400);

  setDefcon(2); beep(600, 0.2, 0.2);
  await addLine('DEFCON 2 - FAST PACE', false, true);
  await sleep(400);

  setDefcon(1); alarm();
  await addLine('*** DEFCON 1 - COCKED PISTOL ***', false, true);
  await addLine('*** NUCLEAR LAUNCH DETECTED ***', false, true);
  await sleep(400);

  await addLine(playerTag + ' LAUNCHING ' + selectedTargets.length + ' ICBM(S)...', false, true);

  let playerMissiles = 6;
  // Launch player missiles
  for(let i=0; i<selectedTargets.length; i++) {
    const origin = playerCities[i % playerCities.length];
    const target = selectedTargets[i];
    const color = playerSide==='us' ? 0x00aaff : 0xff4444;
    createMissileArc(origin, target, color);
    playerMissiles--;
    document.getElementById('missile-count').textContent = 'MISSILES: ' + playerMissiles;
    await addLine('  ICBM ' + (i+1) + ' -> ' + target.name, false);
    beep(1200, 0.05, 0.15);
    await sleep(250);
  }

  // Enemy retaliates after delay
  await sleep(1500);
  await addLine('');
  await addLine('*** WARNING: ' + enemyTag + ' RETALIATORY LAUNCH DETECTED ***', false, true);
  alarm();

  const enemyTargets = [...playerCities]
    .sort(() => Math.random()-0.5)
    .slice(0, Math.min(playerCities.length, selectedTargets.length+1));

  for(let i=0; i<enemyTargets.length; i++) {
    const origin = enemyCities[i % enemyCities.length];
    const target = enemyTargets[i];
    const color = enemySide==='us' ? 0x00aaff : 0xff4444;
    createMissileArc(origin, target, color);
    await addLine('  ' + enemyTag + ' ICBM ' + (i+1) + ' -> ' + target.name, false);
    beep(1200, 0.05, 0.15);
    await sleep(250);
  }

  await addLine('');
  await addLine('TRACKING INCOMING AND OUTGOING WARHEADS...', false);

  // Wait for all missiles to land
  await new Promise(resolve => {
    const check = setInterval(() => {
      if(activeMissiles.every(m => m.done)) { clearInterval(check); resolve(); }
    }, 200);
  });

  await sleep(1500);
  await aftermathPhase();
}

async function aftermathPhase() {
  gamePhase = 'aftermath';

  await addLine('========================================', true, true);
  await addLine('        DAMAGE ASSESSMENT REPORT', false, true);

const STRATEGIES = [
  'US FIRST STRIKE - DECAPITATION','USSR FIRST STRIKE - DECAPITATION',
  'US COUNTERFORCE - MILITARY TARGETS','USSR COUNTERFORCE - MILITARY TARGETS',

let zeroRunning = false;
let zeroAbort = false;

function resetGameState() {
  activeMissiles.forEach(m => {
    globeGroup.remove(m.gTrailLine); globeGroup.remove(m.gHead);
    mapGroup.remove(m.fTrailLine); mapGroup.remove(m.fHead);
  });
  activeMissiles = [];
  explosionsList.forEach(exp => {
    if(!exp.done) {
      globeGroup.remove(exp.gFlash); exp.gRings.forEach(r => globeGroup.remove(r.mesh));
      mapGroup.remove(exp.fFlash); exp.fRings.forEach(r => mapGroup.remove(r.mesh));
    }
  });
  explosionsList = [];
  Object.values(cityMeshes).forEach(cm => {
    const c = cm.side==='us' ? 0x00aaff : 0xff4444;
    cm.gdot.material.color.setHex(c); cm.gring.material.color.setHex(c);
    cm.fdot.material.color.setHex(c); cm.fring.material.color.setHex(c);
  });
  casualtyCount = {us:0, ussr:0};
  destroyedCities = new Set();
  selectedTargets = [];
}

function clearScars() {
  [globeGroup, mapGroup].forEach(group => {
    const remove = [];
    group.children.forEach(c => {
      if(c.material && c.material.color && c.material.color.getHex() === 0x441100) remove.push(c);
    });
    remove.forEach(c => group.remove(c));
  });
}

async function playerZeroMode() {
  zeroRunning = true;
  zeroAbort = false;
  gamePhase = 'war';

  document.getElementById('zero-overlay').style.display = 'block';
  document.getElementById('casualty-display').style.display = 'block';

  await addLine('WOPR AUTONOMOUS MODE ACTIVATED', false, true);
  await sleep(300);
  await addLine('RUNNING ALL POSSIBLE ATTACK SCENARIOS...', false, true);
  await sleep(300);
  await addLine('OBJECTIVE: FIND A WINNING STRATEGY', false, true);
  await sleep(500);
  setDefcon(1);

  const totalIterations = STRATEGIES.length;

  for(let i = 0; i < totalIterations && !zeroAbort; i++) {
    const iteration = i + 1;
    const strategy = STRATEGIES[i];

    // Exponential acceleration curve: starts slow, gets insanely fast
    // First 5: ~3s each. By 20: ~1s. By 40: ~300ms. By 60+: ~80ms
    let cycleTime;
    if(i < 5)       cycleTime = 3000 - i * 200;
    else if(i < 15) cycleTime = 2000 * Math.pow(0.82, i - 5);
    else if(i < 30) cycleTime = 700 * Math.pow(0.88, i - 15);
    else if(i < 50) cycleTime = 300 * Math.pow(0.93, i - 30);
    else if(i < 70) cycleTime = 150 * Math.pow(0.96, i - 50);
    else             cycleTime = 80;

    cycleTime = Math.max(80, Math.floor(cycleTime));

    // Update overlay
    document.getElementById('zero-iteration').textContent = 'SCENARIO ' + iteration + ' / ' + totalIterations;
    document.getElementById('zero-strategy').textContent = strategy;
    document.getElementById('zero-speed').textContent = 'CYCLE: ' + cycleTime + 'ms';

    // Reset for new scenario
    resetGameState();
    clearScars();
    updateCasualtyDisplay();

    // Target count scales up: 3 early, up to full 24 late
    const numTargets = Math.min(3 + Math.floor(i / 4), 20);
    const usTargets = [...cities.ussr].sort(() => Math.random()-0.5).slice(0, numTargets);
    const ussrTargets = [...cities.us].sort(() => Math.random()-0.5).slice(0, numTargets);

    // Missile speed: gets dramatically faster
    const missileSpeedMult = 1 + i * 0.8;

    // Launch both sides
    for(let j=0; j<usTargets.length; j++) {
      const origin = cities.us[j % cities.us.length];
      const m = createMissileArc(origin, usTargets[j], 0x00aaff);
      m.speed = (0.015 + Math.random()*0.005) * missileSpeedMult;
    }
    for(let j=0; j<ussrTargets.length; j++) {
      const origin = cities.ussr[j % cities.ussr.length];
      const m = createMissileArc(origin, ussrTargets[j], 0xff4444);
      m.speed = (0.015 + Math.random()*0.005) * missileSpeedMult;
    }

    // Terminal output: typed early, instant mid, skip late
    if(i < 4) {
      await addLine('SCENARIO ' + iteration + ': ' + strategy, false, true);
    } else if(i < 30) {
      await addLine('SCENARIO ' + iteration + ': ' + strategy, true, true);
    } else if(i % 3 === 0) {
      // Only log every 3rd scenario when going super fast
      await addLine('>> #' + iteration + ' ' + strategy + ' ... WINNER: NONE', true);
    }

    // Wait for missiles or cycle timeout
    await Promise.race([
      new Promise(resolve => {
        const check = setInterval(() => {
          if(activeMissiles.every(m => m.done)) { clearInterval(check); resolve(); }
        }, 30);
      }),
      sleep(cycleTime)
    ]);

    // Brief result pause (shrinks to near-zero)
    const resultPause = Math.max(20, cycleTime * 0.2);
    await sleep(resultPause);

    // Sounds: fade out as speed increases
    if(i < 3) alarm();
    else if(i < 10) beep(200, 0.1, 0.1);
    else if(i < 30 && i % 3 === 0) beep(300, 0.03, 0.05);
  }

  // ===== WOPR STOPS. SILENCE. =====
  await sleep(600);
  resetGameState();
  clearScars();
  updateCasualtyDisplay();

  document.getElementById('zero-overlay').style.display = 'none';
  document.getElementById('casualty-display').style.display = 'none';
  terminalEl.innerHTML = '';

  setDefcon(5);
  document.getElementById('defcon-display').className = 'defcon defcon-5';

  // Long dramatic pause - the silence after the storm
  await sleep(2500);
  await addLine('');
  await addLine('========================================', false, true);
  await addLine('  WOPR ANALYSIS COMPLETE', false, true);
  await addLine('  ' + totalIterations + ' SCENARIOS PROCESSED', false, true);
  await addLine('  WINNING STRATEGIES FOUND: 0', false, true);
  await addLine('========================================', false, true);
  await sleep(2500);

  // The famous moment
  const endScreen = document.getElementById('end-screen');
  endScreen.style.display = 'block';

  const winnerEl = document.getElementById('winner-text');
  winnerEl.textContent = '';
  await sleep(500);
  const winText = 'WINNER: NONE';
  for(let j=0; j<winText.length; j++) {
    winnerEl.textContent += winText[j];
    beep(200, 0.05, 0.1);
    await sleep(120);
  }
  await sleep(2500);

  document.getElementById('final-casualties').innerHTML =
    '<p>SCENARIOS TESTED: ' + totalIterations + '</p>' +
    '<p>WINNING SCENARIOS: 0</p>';

  const chessEl = document.getElementById('chess-msg');
  const chessText = 'A STRANGE GAME. THE ONLY WINNING MOVE IS NOT TO PLAY. HOW ABOUT A NICE GAME OF CHESS?';
  for(let j=0; j<chessText.length; j++) {
    chessEl.textContent += chessText[j];
    if(j%4===0) beep(300+Math.random()*200, 0.02, 0.03);
    await sleep(55);
  }

  beep(440, 0.5, 0.1);
  await sleep(500);
  beep(550, 0.5, 0.1);
  await sleep(500);
  beep(660, 0.8, 0.1);

  zeroRunning = false;
  gamePhase = 'end';
}

// ========== ANIMATION LOOP ==========
let lastTime = 0;

function animate(time) {
  requestAnimationFrame(animate);
  const delta = Math.min((time - lastTime) / 1000, 0.1);
  lastTime = time;

  // Smooth zoom
  currentZoom += (targetZoom - currentZoom) * 0.08;
  camera.position.z = currentZoom;

  // Smooth pan (map mode)
  if(viewMode === 'map') {
    mapPanX += (targetPanX - mapPanX) * 0.1;
    mapPanY += (targetPanY - mapPanY) * 0.1;
    mapGroup.position.x = mapPanX;
    mapGroup.position.y = mapPanY;
  }

  // Auto-rotate globe
  if(autoRotate && viewMode==='globe') {
    globeGroup.rotation.y += 0.002;
  }

  // City dot flicker
  Object.values(cityMeshes).forEach(cm => {
    if(destroyedCities.has(cm.city.name)) return;
    const f = 0.7 + Math.sin(time*0.005 + cm.gdot.position.x*10) * 0.3;
    cm.gdot.material.opacity = f;
    cm.gring.material.opacity = f * 0.5;
    cm.fdot.material.opacity = f;
    cm.fring.material.opacity = f * 0.5;
  });

  // Update missiles and explosions
  updateMissiles(delta);
  updateExplosions(delta);

  renderer.render(scene, camera);
}

// ========== INIT ==========
setViewMode('map');
requestAnimationFrame(animate);
titleSequence();
